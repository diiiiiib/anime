<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسلسلات - ANIME_DIIB</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <div class="app-topbar">

            <a href="index.html" class="topbar-logo">ANIME_DIIB</a>

    <!-- الرأس -->

    <main class="container">

        <section class="section">
            <div id="genre-filter" class="genre-filter">
                <!-- سيتم إنشاء أزرار الفلتر هنا بواسطة JavaScript -->
            </div>
        </section>

        <!-- قسم المسلسلات -->
        <section class="section">
            <h2 class="section-title">المسلسلات</h2>
            <div id="anime-container" class="cards-grid">

                    <i class="fab fa-youtube"></i>
                </a>
                <a href="https://web.facebook.com/share/v/18ELx8HwRd/" target="_blank" class="social-link" aria-label="فيسبوك">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://telegram.org" target="_blank" class="social-link" aria-label="تيليجرام">
                    <i class="fab fa-telegram-plane"></i>
                </a>
                <a href="https://instagram.com" target="_blank" class="social-link" aria-label="انستغرام">
                    <i class="fab fa-instagram"></i>
                </a>
             </div>
        </section>
    </main>

    <!-- زر العودة للأعلى -->
    <button id="back-to-top" class="back-to-top" aria-label="العودة للأعلى">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- التنقل السفلي -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home nav-icon"></i>
            <span class="nav-label">الرئيسية</span>
        </a>
        <a href="anime.html" class="nav-item active">
            <i class="fas fa-tv nav-icon"></i>

        </a>
        <a href="movie.html" class="nav-item">

        </a>
